```yaml
name: Bug Report
description: Report a reproducible bug in MDW.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

        Please complete the information below.

  - type: input
    id: mdw-version
    attributes:
      label: MDW Version
      placeholder: 1.0.0
    validations:
      required: true

  - type: input
    id: powershell
    attributes:
      label: PowerShell Version
      placeholder: 7.5.0
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows Version
      placeholder: Windows 11
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
```
