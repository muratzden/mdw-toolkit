name: MDW Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\tests\run-tests.ps1

  test-powershell-7:
    name: PowerShell 7
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File .\tests\run-tests.ps1
